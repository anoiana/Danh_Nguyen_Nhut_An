# Application Configuration
spring.application.name=Leaning Vocabulary

# Database Configuration
# Uses environment variables in production, falls back to local defaults for development
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/learning_vocabulary?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:password}

# JPA
spring.jpa.hibernate.ddl-auto=create
spring.jpa.generate-ddl=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
# hibernate.dialect is auto-detected from JDBC URL (no need to specify manually)

# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true

# Port - uses PORT env var (set by Railway/Render) or defaults to 8080
server.port=${PORT:8080}

# Groq API Key
groq.api.key=${GROQ_API_KEY:placeholder}




