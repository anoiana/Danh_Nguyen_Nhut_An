# Render Blueprint - Auto-configure deployment
# Docs: https://docs.render.com/blueprint-spec
# NOTE: Root Directory on Render must be set to: Web_app_learning_english/back_end

services:
  - type: web
    name: learning-vocabulary-api
    runtime: docker
    rootDir: Web_app_learning_english/back_end
    dockerfilePath: ./Dockerfile
    region: singapore
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false  # Set manually after creating MySQL
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: PORT
        value: 8080
